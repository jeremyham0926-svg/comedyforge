<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comedy Multiverse Co.</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>Comedy Multiverse Co.</h1>

    <!-- CHARACTER LIST -->
    <section id="characters"></section>

    <!-- SCENE GENERATOR -->
    <section id="scene-generator">
        <h2>Scene Generator</h2>

        <input 
            id="scene-prompt" 
            type="text" 
            placeholder="Enter your scene prompt..."
        />

        <button id="generate-btn">Generate Scene</button>
        <button id="chaos-btn" style="background:red;color:white;">CHAOS MODE</button>

        <div id="scene-output"></div>
    </section>

    <!-- LOAD ALL JS FILES -->
    <script src="characters.js"></script>
    <script src="scene.js"></script>
    <script src="chaos.js"></script>
    <script src="renderScene.js"></script>
    <script src="script.js"></script>

</body>
</html>
